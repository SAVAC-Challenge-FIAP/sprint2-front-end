<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câmera Frontal</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="shortcut icon" href="./assets/imgs/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/fonts.css">
</head>

<body>
    <div class="palco">
        <div class="dispositivo">
            <header class="cabecalho">
                <div class="ilha-dinamica"></div>
                <div class="barra-status">
                    <span class="hora">8:08</span>
                    <div class="icones-status">
                        <img src="./assets/imgs/icons/icon-signal.svg" alt="Sinal" width="17" height="12">
                        <img src="./assets/imgs/icons/icon-wifi.svg" alt="Wi-Fi" width="16" height="12">
                        <img src="./assets/imgs/icons/icon-battery.svg" alt="Bateria" width="25" height="12">
                    </div>
                </div>
            </header>

            <main class="principal">
                
                <section class="options">
                    <div class="content-options">
                        <a href="./pages/configuração.html" title="Opções da câmera">
                            <img src="./assets/imgs/icons/icon-options.svg" alt="Opções" width="22" height="22">
                        </a>
                    </div>
                </section>
                
                <section class="camera">
                    <div class="content-camera">
                        <img src="./assets/imgs/photos/foto-camera.png" alt="Câmera Frontal" width="375" height="812">
                    </div>
                </section>

                <section class="filtros">
                    <div class="content-filtros">
                        <button class="filter-btn">
                            <span class="filter-name">
                                Vivid
                            </span>
                            <span class="filter-emoji">
                                🌟
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Neon
                            </span>
                            <span class="filter-emoji">
                                🌈
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Love
                            </span>
                            <span class="filter-emoji">
                                ❤️
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Eclipse
                            </span>
                            <span class="filter-emoji">
                                🌒
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Retro
                            </span>
                            <span class="filter-emoji">
                                📼
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Vintage
                            </span>
                            <span class="filter-emoji">
                                🧡
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Arctic
                            </span>
                            <span class="filter-emoji">
                                ❄️
                            </span>
                        </button>
                        <button class="filter-btn">
                            <span class="filter-name">
                                Honey
                            </span>
                            <span class="filter-emoji">
                                🍯
                            </span>
                        </button>
                    </div>
                </section>

                <section class="actions">
                    <div class="content-actions">
                        <a class="btn-action">
                            <img src="./assets/imgs/icons/icon-gallery.svg" alt="Galeria" width="30" height="30">
                        </a>
                        <a href="./pages/modal-edicao.html" class="btn-action">
                            <img src="./assets/imgs/icons/icon-capture.svg" alt="Tirar foto" width="70" height="70">
                        </a>
                        <a class="btn-action">
                            <img src="./assets/imgs/icons/icon-flip.svg" alt="Virar câmera" width="30" height="30">
                        </a>
                    </div>
                </section>
            </main>

            <footer class="rodape">
                <div class="barra-home"></div>
            </footer>
        </div>
    </div>
</body>

</html>
